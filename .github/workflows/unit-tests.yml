name: Unit tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: github-ubuntu-latest-s
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 #v7.0.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Configure NPM with Repox
        uses: SonarSource/ci-github-actions/config-npm@v1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check dist/ is up-to-date
        run: |
          if ! git diff --exit-code dist/ || [ -n "$(git status --porcelain dist/)" ]; then
            echo "::error::dist/ is out of date. Run 'npm run build' and commit the changes."
            git status --short dist/
            exit 1
          fi

      - name: Run tests
        run: npm test
